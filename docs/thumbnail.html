<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280, initial-scale=1" />
    <title>Covenant — YouTube thumbnail</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1280px;
        height: 720px;
        margin: 0;
        overflow: hidden;
      }

      body {
        color: #f8fafc;
        background:
          radial-gradient(circle at 24% 38%, rgba(103, 232, 249, 0.11), transparent 32%),
          radial-gradient(circle at 92% 48%, rgba(244, 63, 94, 0.09), transparent 30%),
          #05070d;
        font-family: Geist, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .canvas {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 56px 64px 58px;
        isolation: isolate;
      }

      .canvas::before {
        position: absolute;
        inset: 0;
        z-index: -1;
        content: "";
        opacity: 0.24;
        background-image:
          linear-gradient(rgba(148, 163, 184, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(148, 163, 184, 0.08) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: linear-gradient(90deg, black, transparent 76%);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        color: #cbd5e1;
        font-size: 25px;
        font-weight: 750;
        letter-spacing: -0.02em;
      }

      .brand-mark {
        display: grid;
        width: 48px;
        height: 48px;
        place-items: center;
        color: #a5f3fc;
        border: 1px solid rgba(103, 232, 249, 0.5);
        border-radius: 13px;
        background: rgba(103, 232, 249, 0.1);
        box-shadow: inset 0 0 18px rgba(103, 232, 249, 0.06);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 18px;
        font-weight: 900;
      }

      .layout {
        display: grid;
        grid-template-columns: 1.62fr 0.88fr;
        align-items: center;
        gap: 48px;
        height: calc(100% - 48px);
      }

      .copy {
        align-self: center;
        padding-bottom: 6px;
      }

      .blocked {
        display: inline-flex;
        align-items: center;
        min-height: 126px;
        padding: 2px 28px 10px;
        color: #fff1f2;
        border: 2px solid rgba(251, 113, 133, 0.72);
        border-radius: 24px;
        background: linear-gradient(135deg, rgba(244, 63, 94, 0.28), rgba(127, 29, 29, 0.14));
        box-shadow:
          0 0 0 7px rgba(244, 63, 94, 0.05),
          0 22px 70px rgba(136, 19, 55, 0.2),
          inset 0 1px rgba(255, 255, 255, 0.08);
        font-size: 104px;
        font-weight: 950;
        line-height: 1;
        letter-spacing: -0.075em;
      }

      h1 {
        max-width: 720px;
        margin: 24px 0 0;
        color: #ffffff;
        font-size: 54px;
        font-weight: 850;
        line-height: 1.03;
        letter-spacing: -0.055em;
        white-space: nowrap;
      }

      .strapline {
        margin: 24px 0 0;
        color: #94a3b8;
        font-size: 28px;
        font-weight: 650;
        letter-spacing: 0.015em;
      }

      .strapline span {
        color: #67e8f9;
      }

      .decision {
        position: relative;
        align-self: center;
        overflow: hidden;
        min-height: 392px;
        padding: 30px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 28px;
        background: linear-gradient(155deg, rgba(15, 23, 42, 0.92), rgba(8, 13, 23, 0.88));
        box-shadow:
          0 34px 90px rgba(0, 0, 0, 0.42),
          inset 0 1px rgba(255, 255, 255, 0.05);
      }

      .decision::after {
        position: absolute;
        right: -90px;
        bottom: -120px;
        width: 280px;
        height: 280px;
        content: "";
        border-radius: 50%;
        background: rgba(103, 232, 249, 0.08);
        filter: blur(4px);
      }

      .decision-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 22px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      }

      .decision-label {
        color: #94a3b8;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 0.11em;
      }

      .block-chip {
        padding: 8px 13px;
        color: #ffe4e6;
        border: 1px solid rgba(251, 113, 133, 0.65);
        border-radius: 999px;
        background: rgba(244, 63, 94, 0.2);
        font-size: 16px;
        font-weight: 900;
        letter-spacing: 0.08em;
      }

      .rows {
        display: grid;
        gap: 27px;
        margin-top: 30px;
      }

      .row-label {
        display: block;
        margin-bottom: 8px;
        color: #94a3b8;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 17px;
        font-weight: 700;
      }

      .row-value {
        display: block;
        color: #e2e8f0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 24px;
        font-weight: 700;
        line-height: 1.18;
        overflow-wrap: anywhere;
      }

      .arrow {
        color: #67e8f9;
      }

      .blocked-value {
        color: #fda4af;
      }

      .edge {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: 5px;
        background: linear-gradient(90deg, #67e8f9, rgba(103, 232, 249, 0.08) 45%, #fb7185);
      }
    </style>
  </head>
  <body>
    <main class="canvas" aria-label="Covenant YouTube thumbnail">
      <div class="brand">
        <span class="brand-mark">CV</span>
        <span>Covenant</span>
      </div>

      <div class="layout">
        <section class="copy" aria-label="Thumbnail headline">
          <div class="blocked">BLOCKED.</div>
          <h1>Your AI agent, governed.</h1>
          <p class="strapline">Policy <span>·</span> Receipts <span>·</span> Immunity</p>
        </section>

        <section class="decision" aria-label="Deterministic decision example">
          <div class="decision-head">
            <span class="decision-label">DETERMINISTIC DECISION</span>
            <span class="block-chip">BLOCK</span>
          </div>

          <div class="rows">
            <div>
              <span class="row-label">tool</span>
              <span class="row-value">send_email <span class="arrow">→</span></span>
            </div>
            <div>
              <span class="row-label">matched_rule</span>
              <span class="row-value">block-customer-<br />data-external <span class="arrow">→</span></span>
            </div>
            <div>
              <span class="row-label">verdict</span>
              <span class="row-value blocked-value">BLOCK</span>
            </div>
          </div>
        </section>
      </div>

      <div class="edge"></div>
    </main>
  </body>
</html>
